<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART & CULTURE EXAM - SMAN 10 SINJAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --clay: #b45309;
            --canvas: #fffaf0;
            --ink: #2d2d2d;
            --correct: #166534;
            --wrong: #991b1b;
            --accent: #d97706;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--canvas); 
            color: var(--ink); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }

        .art-card {
            background: white; border-radius: 20px; padding: 40px;
            box-shadow: 15px 15px 0px rgba(180, 83, 9, 0.1);
            border: 2px solid #e5e7eb;
            display: none; animation: fadeIn 0.6s ease;
        }
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .header { text-align: center; border-bottom: 3px solid var(--clay); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--clay); margin: 0; font-size: 1.8rem; }
        
        .meta-info { display: flex; justify-content: space-between; font-weight: 600; font-size: 0.9rem; color: var(--accent); margin-top: 10px; }

        .question-box { font-size: 1.3rem; font-weight: 600; line-height: 1.6; margin-bottom: 25px; color: #111827; }

        .option-list { display: grid; gap: 15px; }
        .opt {
            padding: 18px; border: 2px solid #f3f4f6; border-radius: 12px;
            cursor: pointer; background: #fafafa; font-size: 1rem;
            transition: 0.3s; display: flex; align-items: center;
        }
        .opt:hover { border-color: var(--clay); background: #fffbeb; }
        .opt.selected { border-color: var(--clay); background: #fef3c7; font-weight: 600; }

        .is-correct { background: #dcfce7 !important; border-color: var(--correct) !important; color: var(--correct); }
        .is-wrong { background: #fee2e2 !important; border-color: var(--wrong) !important; color: var(--wrong); }

        .explanation {
            margin-top: 25px; padding: 20px; border-radius: 12px;
            background: #fefce8; border-left: 6px solid var(--clay);
            display: none; font-size: 0.95rem; line-height: 1.6; color: #4b5563;
        }

        .btn-main {
            width: 100%; padding: 18px; margin-top: 30px; border: none;
            border-radius: 12px; background: var(--clay); color: white;
            font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-main:hover { background: var(--accent); transform: translateY(-2px); }

        .result-circle {
            width: 150px; height: 150px; border: 8px solid var(--clay);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 30px auto; font-size: 3rem; font-weight: 800; color: var(--clay);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen" class="art-card active" style="text-align: center;">
        <div style="font-size: 5rem; margin-bottom: 20px;">🎨</div>
        <h1>GALERI UJIAN SENI BUDAYA</h1>
        <p>Evaluasi Akhir Semester - 50 Pertanyaan Terkurasi</p>
        <button class="btn-main" onclick="startApp()">MASUK GALERI SOAL</button>
    </div>

    <div id="quiz-screen" class="art-card">
        <div class="header">
            <h1 id="category-label">SENI RUPA</h1>
            <div class="meta-info">
                <span id="q-number">ARTWORK 1/50</span>
                <span id="timer">00:00</span>
            </div>
        </div>
        
        <div id="q-text" class="question-box">Memuat pertanyaan...</div>
        <div id="options" class="option-list"></div>

        <div id="exp-box" class="explanation"></div>
        
        <button id="action-btn" class="btn-main" onclick="handleAction()">ANALISIS JAWABAN</button>
    </div>

    <div id="result-screen" class="art-card" style="text-align: center;">
        <h1>APRESIASI AKHIR</h1>
        <div class="result-circle" id="final-score">0</div>
        <p id="feedback-text" style="font-size: 1.2rem; line-height: 1.6;"></p>
        <button class="btn-main" onclick="location.reload()">RE-INTERPRETASI (ULANG)</button>
    </div>
</div>

<script>
const artBank = [
    { q: "Unsur seni rupa yang paling sederhana dan menjadi dasar terbentuknya garis adalah ....", a: ["Bidang", "Titik", "Warna", "Ruang", "Tekstur"], c: 1, e: "Titik adalah unsur visual paling dasar. Dari titik yang digerakkan akan terbentuk garis, lalu berkembang menjadi bidang dan bentuk." },
    { q: "Prinsip seni rupa yang menunjukkan kesan tidak berat sebelah dalam susunan karya adalah ....", a: ["Irama", "Harmoni", "Keseimbangan", "Penekanan", "Kesatuan"], c: 2, e: "Keseimbangan membuat komposisi karya terasa stabil, baik secara simetris maupun asimetris." },
    { q: "Kesan permukaan kasar, halus, licin, atau berbulu dalam karya seni rupa disebut ....", a: ["Ruang", "Tekstur", "Bidang", "Warna", "Proporsi"], c: 1, e: "Tekstur berkaitan dengan kualitas permukaan benda, baik tekstur nyata (diraba) maupun tekstur semu (dilihat)." },
    { q: "Dalam musik, cepat atau lambatnya lagu disebut ....", a: ["Dinamika", "Timbre", "Tempo", "Melodi", "Harmoni"], c: 2, e: "Tempo menunjukkan kecepatan lagu. Jangan tertukar dengan dinamika (keras-lembut)." },
    { q: "Keras atau lembutnya bunyi dalam musik disebut ....", a: ["Ritme", "Dinamika", "Birama", "Tempo", "Nada"], c: 1, e: "Dinamika berkaitan dengan kuat-lemah atau keras-lembutnya bunyi untuk menghidupkan suasana musik." },
    { q: "Susunan perpindahan penari di atas panggung disebut ....", a: ["Kostum", "Koreografi", "Pola lantai", "Blocking", "Improvisasi"], c: 2, e: "Pola lantai adalah desain lintasan atau perpindahan posisi penari di atas panggung." },
    { q: "Dalam teater, penempatan posisi pemain di panggung agar adegan terlihat jelas disebut ....", a: ["Improvisasi", "Blocking", "Penokohan", "Monolog", "Aransemen"], c: 1, e: "Blocking adalah pengaturan posisi dan perpindahan pemain agar fokus penonton terarah dan komposisi panggung estetis." },
    { q: "Unsur yang menunjukkan cara membangun karakter tokoh dalam teater disebut ....", a: ["Alur", "Setting", "Penokohan", "Konflik", "Adegan"], c: 2, e: "Tokoh adalah pelakunya, sedangkan penokohan adalah proses atau cara karakter itu dibentuk (watak)." },
    { q: "Pernyataan yang paling tepat tentang apresiasi seni adalah ....", a: ["Menghafal nama seniman", "Menilai suka/tidak suka saja", "Menghargai karya dengan memahami unsur, makna, dan tujuan", "Menyalin karya mirip aslinya", "Mengkritik tanpa alasan"], c: 2, e: "Apresiasi berarti memahami karya secara sadar, meliputi pengenalan, pemahaman, dan penghargaan nilai seni." },
    { q: "Perbedaan paling tepat antara deskripsi dan analisis karya seni adalah ....", a: ["Deskripsi menilai, analisis judul", "Deskripsi menjelaskan yang tampak, analisis makna & hubungan unsur", "Deskripsi panjang, analisis pendek", "Deskripsi musik, analisis rupa", "Keduanya sama"], c: 1, e: "Deskripsi bersifat inventarisasi yang tampak, sedangkan analisis mencari hubungan antar unsur dan prinsip." },
    { q: "Montase adalah teknik berkarya dengan cara ....", a: ["Menyusun bahan sejenis", "Menempelkan potongan gambar dari berbagai sumber jadi komposisi baru", "Mengukir bahan keras", "Menggambar tanpa alat", "Mencetak pola cap"], c: 1, e: "Montase memanfaatkan potongan gambar yang sudah jadi (dari majalah/koran) lalu disusun ulang menjadi tema baru." },
    { q: "Yang termasuk fungsi utama seni rupa dalam kehidupan adalah ....", a: ["Hapus nilai budaya", "Menyampaikan pesan, memperindah, dan identitas visual", "Alat hafalan", "Ganti bahasa lisan", "Hanya untuk pameran"], c: 1, e: "Seni rupa memiliki fungsi estetis (keindahan), komunikatif (pesan), dan sosial (identitas)." },

    { q: "Mengubah lagu agar sesuai dengan kemampuan pemain dan tujuan pertunjukan disebut ....", a: ["Improvisasi", "Aransemen", "Interval", "Interpretasi", "Transposisi"], c: 1, e: "Aransemen adalah penataan ulang atau penyesuaian komposisi musik tanpa menghilangkan karakter lagu aslinya." },
    { q: "Makna tari yang lahir dari tari tradisi lalu dikembangkan menjadi bentuk baru disebut ....", a: ["Tari tunggal", "Tari kreasi", "Tari ritual", "Tari akrobatik", "Tari dokumenter"], c: 1, e: "Tari kreasi adalah bentuk tari yang bersumber dari tradisi namun dikembangkan secara inovatif." },
    { q: "Tiga unsur utama tari yang paling sering digunakan untuk menjelaskan tari adalah ....", a: ["Warna, garis, bentuk", "Nada, tempo, harmoni", "Wiraga, wirama, wirasa", "Tokoh, alur, dialog", "Cahaya, suara, kostum"], c: 2, e: "Wiraga (gerak tubuh), Wirama (irama/musik), dan Wirasa (penghayatan/perasaan)." },

    { q: "Seluruh unsur teater bekerja bersama membentuk makna utuh disebut prinsip ....", a: ["Kesatuan", "Monolog", "Improvisasi", "Ekspresi bebas", "Dialog internal"], c: 0, e: "Kesatuan (Unity) memastikan elemen panggung, naskah, dan akting tidak terpecah-pecah." },
    { q: "Menilai karya seni berdasarkan unsur, makna, dan dampaknya disertai alasan disebut ....", a: ["Menyalin", "Menghafal", "Kritik seni", "Improvisasi", "Eksperimen"], c: 2, e: "Kritik seni melibatkan analisis objektif dan evaluasi mendalam, bukan sekadar komentar subjektif." },
    { q: "Gerak sederhana dengan penghayatan mendalam menunjukkan unsur ....", a: ["Wirasa", "Pola lantai", "Properti", "Kostum", "Tempo"], c: 0, e: "Wirasa adalah kemampuan penari dalam mengekspresikan karakter dan jiwa tarian." },

    { q: "Memadukan musik dengan teknologi dan seni lain menunjukkan kemampuan ....", a: ["Salin lagu", "Menciptakan musik yang autentik", "Hafal not", "Kurangi unsur", "Hapus konteks"], c: 1, e: "Kreativitas modern dalam musik melibatkan kolaborasi lintas media untuk keaslian karya." },
    { q: "Warna bunyi yang membedakan suara manusia dan instrumen disebut ....", a: ["Timbre", "Tempo", "Birama", "Ritme", "Interval"], c: 0, e: "Setiap sumber bunyi memiliki spektrum frekuensi unik yang disebut timbre." },
    { q: "Gerak penari yang menyampaikan emosi sesuai tema menonjolkan aspek ....", a: ["Wiraga", "Wirama", "Wirasa", "Pola lantai", "Kostum"], c: 2, e: "Wirasa adalah jembatan emosi antara penari dan penonton." },
    { q: "Gerak baru tari kreasi tetap harus memperhatikan ....", a: ["Tema, simbol, dan makna", "Banyak kostum", "Jumlah penonton", "Lampu panggung", "Panjang panggung"], c: 0, e: "Meskipun baru, tari harus memiliki landasan filosofis yang kuat (makna)." },
    { q: "Konflik dalam teater berfungsi untuk ....", a: ["Hapus alur", "Menggerakkan cerita agar berkembang", "Ganti kostum", "Warna panggung", "Dialog tidak perlu"], c: 1, e: "Tanpa konflik, tidak ada ketegangan yang mendorong alur cerita menuju klimaks." },
    { q: "Urutan analisis karya seni rupa yang tepat adalah ....", a: ["Suka lalu selesai", "Lihat unsur visual, pahami prinsip, maknai pesan", "Langsung nilai bagus/jelek", "Hafal judul", "Salin deskripsi"], c: 1, e: "Metodologi kritik: Deskripsi (visual), Analisis (prinsip), Interpretasi (makna)." },
    { q: "Lagu daerah dengan teknologi dan bidang seni lain menunjukkan kemampuan ....", a: ["Hafal lirik", "Mewujudkan dan menyajikan karya musik", "Salin not", "Ubah lagu", "Hapus budaya"], c: 1, e: "Ini adalah bentuk performansi musik integratif sesuai kurikulum modern." },
    { q: "Perbedaan utama tokoh utama dan pendukung adalah ....", a: ["Utama tak bicara", "Pendukung penting", "Utama sentral alur & konflik", "Utama antagonis", "Pendukung tak tampil"], c: 2, e: "Tokoh utama adalah penggerak utama cerita dari awal hingga akhir." },
    { q: "Evaluasi pertunjukan tari kelas 12 memperhatikan ....", a: ["Tinggi badan", "Keselarasan gerak, ekspresi, iringan, & tata pentas", "Penonton", "Harga kostum", "Lama latihan"], c: 1, e: "Penilaian menyeluruh terhadap harmoni seluruh elemen panggung." },
    { q: "Kritik seni harus disertai dasar jelas agar ....", a: ["Terdengar rumit", "Penilaian tidak hanya selera pribadi", "Karya sempurna", "Semua sama", "Tak lihat karya"], c: 1, e: "Argumen ilmiah menjaga objektivitas dalam menilai sebuah karya seni." },
    { q: "Karya rupa ide pribadi dengan akar budaya sesuai Fase F bagian ....", a: ["Salin karya", "Berdampak", "Ulang sketsa", "Hafal definisi", "Nonton pameran"], c: 1, e: "Karya yang berdampak adalah karya yang memiliki relevansi sosial dan budaya." },

    { q: "Pementasan komedi modern dan tradisi untuk gagasan baru menunjukkan Fase ....", a: ["Rupa", "Musik", "Tari", "Seni Teater Fase F", "Bahasa"], c: 3, e: "Fase F Teater menonjolkan inovasi garapan baru yang kontekstual." },
    { q: "Menjawab masalah hidup dengan gagasan rupa menunjukkan kemampuan ....", a: ["Hafal unsur", "Menciptakan peluang dan menyelesaikan masalah", "Salin komposisi", "Tiru poster", "Abaikan konteks"], c: 1, e: "Design Thinking: menggunakan seni sebagai solusi kreatif atas masalah nyata." },
    { q: "Kesimpulan belajar Seni Budaya SMA (Kelas 10-12) adalah ....", a: ["Hafal alat", "Berhenti dasar", "Mengenal unsur, analisis, mencipta, menyaji, & evaluasi", "Teori saja", "Semua sama"], c: 2, e: "Tujuan akhirnya adalah literasi seni yang menyeluruh: dari teknis hingga evaluasi." },
    { q: "Unsur tari yang berkaitan dengan kesesuaian gerak terhadap irama adalah ....", a: ["Wiraga", "Wirama", "Wirasa", "Pola lantai", "Properti"], c: 1, e: "Wirama memastikan gerak tubuh selaras dengan tempo dan dinamika musik pengiring." }
];

let curIdx = 0, score = 0, time = 0, active = false, pick = -1;

function startApp() {
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('quiz-screen').classList.add('active');
    active = true;
    setInterval(() => { if(active) { time++; updateMeta(); } }, 1000);
    loadQ();
}

function updateMeta() {
    let m = Math.floor(time/60).toString().padStart(2,'0');
    let s = (time%60).toString().padStart(2,'0');
    document.getElementById('timer').innerText = `${m}:${s}`;
    document.getElementById('q-number').innerText = `ARTWORK ${curIdx + 1}/50`;
}

function loadQ() {
    pick = -1;
    const data = artBank[curIdx];
    document.getElementById('q-text').innerText = data.q;
    document.getElementById('exp-box').style.display = 'none';
    document.getElementById('action-btn').innerText = "ANALISIS JAWABAN";
    
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = "";
    data.a.forEach((o, i) => {
        const d = document.createElement('div');
        d.className = 'opt';
        d.innerHTML = `<strong>${String.fromCharCode(65+i)}.</strong> &nbsp; ${o}`;
        d.onclick = () => { if(document.getElementById('exp-box').style.display === 'none') {
            document.querySelectorAll('.opt').forEach(x => x.classList.remove('selected'));
            d.classList.add('selected'); pick = i;
        }};
        optsDiv.appendChild(d);
    });
}

function handleAction() {
    const btn = document.getElementById('action-btn');
    if(btn.innerText === "ANALISIS JAWABAN") {
        if(pick === -1) return alert("Tentukan pilihan apresiasimu!");
        reveal();
        btn.innerText = (curIdx === 49) ? "SELESAIKAN PAMERAN" : "LANJUTKAN";
    } else {
        if(curIdx < 49) { curIdx++; loadQ(); } else { endApp(); }
    }
}

function reveal() {
    const data = artBank[curIdx], opts = document.querySelectorAll('.opt');
    opts[data.c].classList.add('is-correct');
    if(pick !== data.c) opts[pick].classList.add('is-wrong');
    else score++;
    const exp = document.getElementById('exp-box');
    exp.innerHTML = `<strong>KURASI:</strong> ${data.e}`;
    exp.style.display = 'block';
}

function endApp() {
    active = false;
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    const fScore = Math.round((score/50)*100);
    document.getElementById('final-score').innerText = fScore;
    let msg = fScore >= 80 ? "Kamu adalah seorang Kurator Seni sejati! Pemahamanmu sangat mendalam." : 
              fScore >= 60 ? "Apresiasi yang bagus! Kamu memiliki minat seni yang kuat." : 
              "Teruslah mengeksplorasi dunia seni, setiap karya punya makna untukmu.";
    document.getElementById('feedback-text').innerText = msg + `\n\nSkor: ${score} dari 50 soal dalam waktu ${document.getElementById('timer').innerText}`;
}
</script>
</body>
</html>
