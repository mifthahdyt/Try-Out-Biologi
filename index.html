<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGLISH EXAM V3 - SMAN 10 SINJAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Merriweather:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --accent: #f0f6fc;
            --text-p: #8b949e;
            --correct: #238636;
            --wrong: #da3633;
            --border: #30363d;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            background-color: var(--bg); 
            color: var(--accent); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
        }

        .app-container { width: 100%; max-width: 750px; }

        .glass-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: none;
        }
        .active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .reading-section {
            background: #0d1117;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            margin-bottom: 20px;
            font-family: 'Merriweather', serif;
            line-height: 1.7;
            color: #c9d1d9;
            font-size: 0.95rem;
        }

        .header-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .q-badge { font-size: 11px; letter-spacing: 1px; color: var(--text-p); text-transform: uppercase; font-weight: 700; }
        .timer-tag { background: #21262d; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; border: 1px solid var(--border); }

        h2 { font-weight: 600; font-size: 1.2rem; margin: 0 0 20px 0; }

        .opt-grid { display: grid; gap: 10px; }
        .option {
            background: #21262d;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .option:hover { border-color: #8b949e; }
        .option.selected { border-color: var(--accent); background: #30363d; }

        /* Status colors */
        .correct-ans { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; font-weight: 700; }
        .wrong-ans { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; font-weight: 700; }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: #0d1117;
            font-weight: 800;
            cursor: pointer;
            margin-top: 25px;
        }

        .explanation-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            background: #1c2128;
            display: none;
            border: 1px solid var(--border);
            line-height: 1.5;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .progress-bar { width: 100%; height: 4px; background: #30363d; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="sc-start" class="glass-card active" style="text-align: center;">
        <h1 style="font-size: 2.2rem; letter-spacing: -1px;">English Final Exam</h1>
        <p style="color: var(--text-p); margin-bottom: 30px;">Tingkat Lanjut • SMAN 10 SINJAI • 2026</p>
        <button class="btn-main" onclick="startExam()">Mulai Ujian Sekarang</button>
    </div>

    <div id="sc-quiz" class="glass-card">
        <div class="header-meta">
            <span id="q-counter" class="q-badge">Question 1/50</span>
            <div id="timer" class="timer-tag">00:00</div>
        </div>
        <div class="progress-bar"><div id="p-fill" class="progress-fill"></div></div>
        
        <div id="quiz-body"></div>
        <div id="expl-box" class="explanation-box"></div>
        
        <button id="btn-next" class="btn-main" onclick="handleFlow()">CHECK ANSWER</button>
    </div>

    <div id="sc-result" class="glass-card" style="text-align: center;">
        <span class="q-badge">Selesai</span>
        <div id="final-score" style="font-size: 5.5rem; font-weight: 800; margin: 10px 0;">0</div>
        <p id="summary-msg" style="color: var(--text-p); margin-bottom: 30px;"></p>
        <button class="btn-main" onclick="location.reload()">Ulangi Ujian</button>
    </div>
</div>

<script>
const questions = [
    { text: "The school library is a quiet and comfortable place. Students can borrow books, read novels, and study after class. Many students like it because it helps them learn in a calm environment.", q: "What is the main idea of the text?", opts: ["The school library is only for teachers.", "The school library is a quiet and useful place for students.", "Students should never visit the library.", "The library is used for sports activities.", "The library is always noisy."], ans: 1, exp: "Teks menjelaskan perpustakaan sebagai tempat yang tenang dan berguna bagi siswa untuk belajar." },
    { q: "What can students do in the library?", opts: ["Borrow books", "Cook food", "Watch movies", "Play football", "Sleep during class"], ans: 0, exp: "Kalimat kedua menyebutkan bahwa siswa dapat meminjam buku (borrow books)." },
    { q: "In the sentence “Many students like it,” the word “it” refers to ...", opts: ["class", "teacher", "library", "book", "novel"], ans: 2, exp: "Kata 'it' menggantikan subjek utama yaitu 'the school library'." },
    { text: "Last Sunday, Nisa and her family went to the beach. After arriving, they spread a mat, ate breakfast, and watched the waves. Nisa felt very happy because the sea breeze was fresh and the scenery was beautiful.", q: "What is the purpose of the text?", opts: ["To give instructions", "To tell a past event", "To compare two places", "To persuade readers", "To explain a process"], ans: 1, exp: "Teks ini adalah recount text yang menceritakan pengalaman masa lalu (last Sunday)." },
    { q: "What did Nisa and her family do after arriving at the beach?", opts: ["They played basketball.", "They spread a mat and ate breakfast.", "They bought new books.", "They cleaned the classroom.", "They went home immediately."], ans: 1, exp: "Sesuai teks: 'they spread a mat, ate breakfast'." },
    { q: "The word “happy” is closest in meaning to ...", opts: ["sad", "angry", "pleased", "tired", "afraid"], ans: 2, exp: "Happy (senang) memiliki arti yang sama dengan pleased (puas/senang)." },
    { text: "Rafi found a small bird with a hurt wing. He brought it home, cleaned the wound, and fed it carefully. Two days later, the bird could fly again. Rafi released it near a tree and smiled.", q: "What can we infer about Rafi?", opts: ["He is careless", "He is kind and helpful", "He is lazy", "He is angry", "He is rude"], ans: 1, exp: "Membantu burung yang terluka menunjukkan sifat baik dan suka menolong." },
    { q: "What is the moral value of the story?", opts: ["Do not help animals", "Helping others is good", "Birds stay in cages", "Ignore injured animals", "Flying is dangerous"], ans: 1, exp: "Pesan moralnya adalah membantu sesama makhluk hidup adalah hal yang baik." },
    { q: "In the sentence “He brought it home,” the word “it” refers to ...", opts: ["the tree", "the wing", "the bird", "the wound", "the house"], ans: 2, exp: "It merujuk pada 'a small bird' yang ditemukan Rafi." },
    { text: "1. Boil water. 2. Put tea bags into a glass. 3. Add sugar and hot water. 4. Stir well. 5. Add ice cubes before serving.", q: "What is the first step in the procedure?", opts: ["Add ice cubes", "Stir well", "Put tea bags", "Boil water", "Add sugar"], ans: 3, exp: "Langkah nomor 1 adalah merebus air (boil water)." },
    { q: "What is the purpose of the text?", opts: ["To tell a story", "To explain how to make iced tea", "To describe a beach", "To invite someone", "To give an opinion"], ans: 1, exp: "Teks prosedur bertujuan menjelaskan langkah pembuatan sesuatu." },
    { q: "The word “stir” means ...", opts: ["freeze", "mix", "taste", "break", "pour"], ans: 1, exp: "Stir berarti mengaduk, yang tujuannya adalah mencampur (mix)." },
    { text: "Reading every day is very beneficial. First, it improves vocabulary. Second, it helps students understand texts more easily. Therefore, students should make reading a habit.", q: "What is the main opinion of the writer?", opts: ["Reading is useless", "Reading every day is beneficial", "Students should stop reading", "Vocabulary is not important", "Texts are always easy"], ans: 1, exp: "Penulis berpendapat bahwa membaca setiap hari sangat bermanfaat (beneficial)." },
    { q: "Which sentence is a supporting reason?", opts: ["Reading every day is very beneficial.", "Therefore, students should make reading a habit.", "It improves vocabulary.", "Reading is boring.", "Students should not read."], ans: 2, exp: "Meningkatkan kosakata adalah salah satu alasan pendukung opini penulis." },
    { q: "The word “beneficial” is closest in meaning to ...", opts: ["harmful", "useful", "expensive", "silent", "difficult"], ans: 1, exp: "Beneficial berarti bermanfaat atau berguna (useful)." },
    { text: "Announcement: School Meeting on Friday, 10 April 2026, at 10 a.m. in the school hall. Please bring your notebooks.", q: "What is the purpose of the announcement?", opts: ["To tell a joke", "To inform students about a meeting", "To invite people to a party", "To give a recipe", "To describe a person"], ans: 1, exp: "Pengumuman bertujuan memberi informasi tentang rapat sekolah." },
    { q: "When will the meeting be held?", opts: ["Monday", "Friday, 10 April 2026", "Sunday", "Saturday", "Next month"], ans: 1, exp: "Sesuai teks: Friday, 10 April 2026." },
    { q: "Who must attend the meeting?", opts: ["All students", "All class representatives", "All parents", "All teachers", "Janitor"], ans: 1, exp: "Teks menyebutkan 'All class representatives' (seluruh perwakilan kelas)." },
    { text: "Dear Dina, You are invited to my 17th birthday party this Saturday at 4 p.m. at my house. Love, Sarah", q: "What is the purpose of the text?", opts: ["To report an event", "To invite Dina to a birthday party", "To explain rules", "To give directions", "To ask for homework"], ans: 1, exp: "Ini adalah teks undangan (invitation) untuk ulang tahun." },
    { q: "Where will the party take place?", opts: ["At Dina’s school", "At a restaurant", "At Sarah’s house", "In the library", "At the beach"], ans: 2, exp: "Lokasi pesta adalah 'at my house' (rumah Sarah)." },
    { q: "The phrase “my family and me” refers to ...", opts: ["Dina only", "Sarah and her family", "Sarah’s teachers", "Sarah’s classmates only", "The guests only"], ans: 1, exp: "'Me' dalam teks adalah pengirim surat, yaitu Sarah." },
    { q: "Teacher: Have you finished the assignment? Student: Not yet. Teacher: ___", opts: ["I am sorry to hear that. Submit it tomorrow.", "I do not care.", "Submit last month.", "Never study.", "Not your school."], ans: 0, exp: "Respon yang paling sopan dan logis adalah memberikan toleransi waktu." },
    { q: "What does the teacher show in the dialogue?", opts: ["Anger", "Concern and flexibility", "Confusion", "Laziness", "Fear"], ans: 1, exp: "Guru menunjukkan perhatian (concern) dan kelenturan (flexibility) waktu." },
    { q: "She ___ to school every day.", opts: ["goes", "go", "going", "went", "gone"], ans: 0, exp: "Simple Present untuk subjek tunggal 'She' adalah 'goes'." },
    { q: "They ___ the museum yesterday.", opts: ["visit", "visits", "visited", "visiting", "will visit"], ans: 2, exp: "Kata 'yesterday' menunjukkan masa lampau (V2: visited)." },
    { q: "We ___ a science project next week.", opts: ["will do", "did", "do", "are did", "doing"], ans: 0, exp: "Next week menunjukkan masa depan (future) menggunakan 'will'." },
    { q: "The windows ___ by the janitor every morning.", opts: ["clean", "cleans", "are cleaned", "cleaned", "is cleaned"], ans: 2, exp: "Kalimat pasif jamak (windows) menggunakan 'are + V3'." },
    { q: "This bag is ___ than that one.", opts: ["heavy", "heavier", "highest", "more heavy", "most heavy"], ans: 1, exp: "Perbandingan dua benda (comparative) menggunakan 'heavier'." },
    { q: "He is the ___ player in the team.", opts: ["good", "better", "best", "well", "more good"], ans: 2, exp: "Superlatif (paling) dari 'good' adalah 'the best'." },
    { q: "You ___ finish your homework before playing.", opts: ["must", "might", "can", "would", "could"], ans: 0, exp: "Must digunakan untuk menunjukkan kewajiban/keharusan." },
    { q: "The students ___ in the classroom.", opts: ["is", "are", "was", "be", "am"], ans: 1, exp: "Subjek jamak (students) menggunakan to-be 'are'." },
    { q: "Rina left early because ___ was tired.", opts: ["he", "they", "she", "it", "we"], ans: 2, exp: "Kata ganti untuk Rina (perempuan) adalah 'she'." },
    { q: "I studied hard ___ I could pass the test.", opts: ["because", "so that", "although", "unless", "since"], ans: 1, exp: "'So that' digunakan untuk menunjukkan tujuan (supaya/agar)." },
    { q: "___ it was late, he continued studying.", opts: ["Because", "So", "Although", "If", "Until"], ans: 2, exp: "'Although' (meskipun) menunjukkan pertentangan." },
    { q: "The word “crucial” is closest in meaning to ...", opts: ["important", "weak", "late", "noisy", "simple"], ans: 0, exp: "Crucial artinya sangat penting (important)." },
    { q: "The word “borrow” means ...", opts: ["give forever", "take for a short time and return", "buy", "destroy", "hide"], ans: 1, exp: "Borrow artinya meminjam (ambil sementara lalu dikembalikan)." },
    { q: "The word “carefully” means ...", opts: ["quickly", "with attention", "loudly", "carelessly", "late"], ans: 1, exp: "Carefully artinya dengan penuh perhatian (with attention)." },
    { q: "He was late; ___, he apologized.", opts: ["however", "therefore", "although", "because", "unless"], ans: 1, exp: "Therefore digunakan untuk menunjukkan akibat (oleh karena itu)." },
    { q: "The door ___ every night.", opts: ["lock", "locks", "is locked", "locked", "locking"], ans: 2, exp: "Kalimat pasif tunggal: 'is locked'." },
    { q: "Our teacher told ___ to work in pairs.", opts: ["we", "us", "our", "ours", "ourselves"], ans: 1, exp: "Objek pronoun untuk 'we' adalah 'us'." },
    { q: "The main idea of a paragraph is the ...", opts: ["longest sentence", "central message", "last word", "difficult vocabulary", "title only"], ans: 1, exp: "Ide utama adalah pesan pusat/inti dari paragraf." },
    { q: "A recount text tells about ...", opts: ["a recipe", "past events", "a rule", "an argument", "plans"], ans: 1, exp: "Recount text berfungsi menceritakan kejadian masa lalu." },
    { q: "An announcement is made to ...", opts: ["tell a secret", "inform many people", "describe a place", "tell a story", "ask help"], ans: 1, exp: "Pengumuman dibuat untuk menginformasikan orang banyak." },
    { q: "The social function of a procedure text is to ...", opts: ["explain steps", "tell a legend", "compare objects", "express feelings", "give news"], ans: 0, exp: "Teks prosedur menjelaskan langkah-langkah melakukan sesuatu." },
    { q: "In analytical exposition, the writer gives ...", opts: ["only a story", "an opinion and reasons", "a recipe", "a list of names", "a dialogue"], ans: 1, exp: "Teks ini berisi opini penulis beserta argumen/alasannya." },
    { q: "Which question asks for a detail in a text?", opts: ["What is the main idea?", "Why does the writer write?", "When does the meeting start?", "What is the moral value?", "What is the opinion?"], ans: 2, exp: "Pertanyaan 'When' (Kapan) menanyakan informasi detail waktu." },
    { q: "Which word shows sequence in a procedure text?", opts: ["first", "because", "although", "however", "since"], ans: 0, exp: "First, second, then, dll adalah kata urutan." },
    { q: "Which sentence is correct?", opts: ["My friend and I are going", "My friend and I is going", "Friend and me are", "I am going", "I going"], ans: 0, exp: "Subjek jamak 'My friend and I' menggunakan 'are'." },
    { q: "The students took their books. The word “their” refers to ...", opts: ["the books", "the students", "the teacher", "the classroom", "the lesson"], ans: 1, exp: "Their adalah kata ganti kepemilikan untuk 'the students'." },
    { q: "“Could you repeat that, please?” is used to ...", opts: ["answer", "ask someone to say again", "end conversation", "make invitation", "give command"], ans: 1, exp: "Ungkapan ini digunakan untuk meminta pengulangan kata." }
];

let curIdx = 0, score = 0, time = 0, timerOn = false, selectedIdx = -1;

function startExam() {
    document.getElementById('sc-start').classList.remove('active');
    document.getElementById('sc-quiz').classList.add('active');
    timerOn = true;
    setInterval(() => { if(timerOn) { time++; updateUI(); } }, 1000);
    renderQuestion();
}

function updateUI() {
    let m = Math.floor(time/60).toString().padStart(2,'0');
    let s = (time%60).toString().padStart(2,'0');
    document.getElementById('timer').innerText = `${m}:${s}`;
    document.getElementById('q-counter').innerText = `Question ${curIdx+1}/${questions.length}`;
    document.getElementById('p-fill').style.width = `${((curIdx+1)/questions.length)*100}%`;
}

function renderQuestion() {
    const q = questions[curIdx], body = document.getElementById('quiz-body');
    let h = '';
    if(q.text) h += `<div class="reading-section">${q.text}</div>`;
    h += `<h2>${q.q}</h2><div class="opt-grid">`;
    q.opts.forEach((o, i) => {
        h += `<div class="option" onclick="selectOpt(${i})">${o}</div>`;
    });
    h += `</div>`;
    body.innerHTML = h;
    document.getElementById('expl-box').style.display = 'none';
    document.getElementById('btn-next').innerText = "CHECK ANSWER";
    selectedIdx = -1;
}

function selectOpt(i) {
    if(document.getElementById('expl-box').style.display === 'block') return;
    const opts = document.querySelectorAll('.option');
    opts.forEach(o => o.classList.remove('selected'));
    opts[i].classList.add('selected');
    selectedIdx = i;
}

function handleFlow() {
    const btn = document.getElementById('btn-next');
    if(btn.innerText === "CHECK ANSWER") {
        if(selectedIdx === -1) return alert("Pilih satu jawaban!");
        checkAns();
        btn.innerText = (curIdx === questions.length-1) ? "LIHAT HASIL" : "NEXT QUESTION";
    } else {
        if(curIdx < questions.length-1) {
            curIdx++;
            renderQuestion();
            updateUI();
        } else {
            showResult();
        }
    }
}

function checkAns() {
    const q = questions[curIdx], opts = document.querySelectorAll('.option'), box = document.getElementById('expl-box');
    const isCorrect = (selectedIdx === q.ans);
    
    // Warna jawaban benar
    opts[q.ans].classList.add('correct-ans');
    
    // Warna jika salah
    if(!isCorrect) {
        opts[selectedIdx].classList.add('wrong-ans');
    } else {
        score++;
    }

    // Pembahasan
    box.innerHTML = `<strong>${isCorrect ? 'BENAR!' : 'SALAH!'}</strong><br>${q.exp}`;
    box.style.display = 'block';
}

function showResult() {
    timerOn = false;
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-result').classList.add('active');
    const final = Math.round((score/questions.length)*100);
    document.getElementById('final-score').innerText = final;
    document.getElementById('summary-msg').innerText = `Kamu menjawab ${score} dari ${questions.length} soal dengan benar dalam waktu ${document.getElementById('timer').innerText}.`;
}
</script>
</body>
</html>
